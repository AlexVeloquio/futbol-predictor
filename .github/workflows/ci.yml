name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Check formatting (black)
        run: black --check src/ tests/

      - name: Check import order (isort)
        run: isort --check-only src/ tests/

      - name: Lint (flake8)
        run: flake8 src/ tests/ --max-line-length=120

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/training/requirements.txt
          pip install -r src/inference/requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build training image
        run: docker build -t futbol-predictor-training:test -f src/training/Dockerfile .

      - name: Build inference image
        run: docker build -t futbol-predictor-inference:test -f src/inference/Dockerfile .

      - name: Verify images
        run: docker images | grep futbol-predictor
