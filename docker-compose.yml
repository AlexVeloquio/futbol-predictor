version: "3.9"

services:
  # ---- Emulación de AWS local ----
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"      # Gateway para todos los servicios AWS
    environment:
      - SERVICES=s3,dynamodb,lambda
      - DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

  # ---- Setup inicial (crea bucket S3 y tabla DynamoDB) ----
  aws-setup:
    image: amazon/aws-cli:latest
    depends_on:
      - localstack
    entrypoint: /bin/sh
    command: >
      -c "
        echo 'Esperando a LocalStack...' &&
        sleep 10 &&
        aws --endpoint-url=http://localstack:4566 s3 mb s3://futbol-predictor-models &&
        aws --endpoint-url=http://localstack:4566 dynamodb create-table \
          --table-name futbol-predictions \
          --attribute-definitions AttributeName=match_key,AttributeType=S \
          --key-schema AttributeName=match_key,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST &&
        echo '✅ Recursos AWS locales creados.'
      "
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1

volumes:
  localstack_data:
